name: Bug report
description: Report a bug in CallLint
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include secrets or private
        config values. For security-sensitive issues, email security@calllint.com
        instead of opening a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A minimal config and the exact `calllint` command you ran. Redact any secrets.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CallLint version
      description: Output of `calllint --version`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS / Node version
      placeholder: "Windows 11 / Node 20.11"
    validations:
      required: false
