# Publishes the bundled CallLint CLI when a GitHub Release is published:
#   - apps/cli → npm `calllint` (tag must equal v<apps/cli version>)
# Uses npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN is stored. With
# trusted publishing from GitHub Actions, npm generates build provenance
# automatically.
#
# `calllint-mcp` is published SEPARATELY by publish-mcp.yml (its own `mcp-v*`
# tag line + the MCP Registry), so it is intentionally NOT handled here — one
# package per workflow keeps the trigger, versioning, and idempotency clean.
#
# PREREQUISITE (one-time, manual): on npmjs.com configure `calllint` as a
# trusted publisher for this repo + workflow. Until that is done, the publish
# step fails by design — it never falls back to a stored token.
#
# This workflow NEVER executes a scanned MCP server; it only builds and publishes.
name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node >= 22.14 ships npm >= 11.5.1, required for npm Trusted
          # Publishing (OIDC). Node 20 ships npm 10.x and the publish step
          # would fail. Pin to 24.x (active LTS) for headroom.
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (typecheck, test, build, corpus, bench, smoke)
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm corpus:test
          pnpm bench:test
          pnpm smoke
          pnpm pack:smoke
          pnpm pack:smoke:mcp

      - name: Verify tag matches version and derive dist-tag
        id: meta
        working-directory: apps/cli
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PKG_VERSION="v$VERSION"
          TAG="${GITHUB_REF_NAME}"

          # A release can be published on a FLOATING alias tag (e.g. `v1`, `v2`)
          # to refresh the GitHub Marketplace listing for the composite Action —
          # that action.yml install-from-npm at runtime, so no npm publish is
          # wanted or possible for a non-semver tag. Detect those and skip the
          # publish cleanly (green run) instead of failing the version guard.
          # Only strict vX.Y.Z[-pre] tags proceed to the npm publish path.
          if ! printf '%s' "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag '$TAG' is a floating/alias tag (not a vX.Y.Z release) — skipping npm publish."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match apps/cli version ($PKG_VERSION)." >&2
            exit 1
          fi
          # Derive the dist-tag from the version so a tag can never claim the
          # wrong channel:
          #   *-rc.*  → next     (release candidates; kept off `preview` so
          #                       preview testers are not auto-moved onto an rc)
          #   *-*     → preview  (any other prerelease: preview/beta/alpha)
          #   *       → latest   (clean semver → the stable default tag)
          # This stops a prerelease from ever claiming the default `latest` tag
          # through this workflow, and keeps rc separate from preview.
          case "$VERSION" in
            *-rc.*) DIST_TAG=next ;;
            *-*)    DIST_TAG=preview ;;
            *)      DIST_TAG=latest ;;
          esac
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Idempotency guard: npm registry versions are immutable, so a second
          # publish of an already-present version hard-fails. If this exact
          # version is already on the registry (e.g. re-publishing a Release for
          # a version published before this workflow existed), skip the publish
          # step instead of red-lining the run.
          if npm view "calllint@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "calllint@$VERSION is already on npm; the publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $VERSION to dist-tag '$DIST_TAG'."
          fi

      - name: Publish calllint to npm (trusted publishing + provenance)
        if: steps.meta.outputs.already_published != 'true'
        working-directory: apps/cli
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"
