# Publishes the bundled CallLint packages when a GitHub Release is published:
#   - apps/cli            → npm `calllint`     (tag must equal v<apps/cli version>)
#   - packages/calllint-mcp → npm `calllint-mcp` (its own independent version)
# Uses npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN is stored. With
# trusted publishing from GitHub Actions, npm generates build provenance
# automatically.
#
# PREREQUISITE (one-time, manual, PER PACKAGE): on npmjs.com configure BOTH
# `calllint` AND `calllint-mcp` as trusted publishers for this repo + workflow.
# Until that is done for a package, its publish step fails by design — it never
# falls back to a stored token. `calllint-mcp` is new in 0.6.0 and needs this
# setup before its first publish can succeed.
#
# This workflow NEVER executes a scanned MCP server; it only builds and publishes.
name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node >= 22.14 ships npm >= 11.5.1, required for npm Trusted
          # Publishing (OIDC). Node 20 ships npm 10.x and the publish step
          # would fail. Pin to 24.x (active LTS) for headroom.
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (typecheck, test, build, corpus, smoke)
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm corpus:test
          pnpm smoke
          pnpm pack:smoke
          pnpm pack:smoke:mcp

      - name: Verify tag matches version and derive dist-tag
        id: meta
        working-directory: apps/cli
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PKG_VERSION="v$VERSION"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match apps/cli version ($PKG_VERSION)." >&2
            exit 1
          fi
          # Derive the dist-tag from the version so a tag can never claim the
          # wrong channel:
          #   *-rc.*  → next     (release candidates; kept off `preview` so
          #                       preview testers are not auto-moved onto an rc)
          #   *-*     → preview  (any other prerelease: preview/beta/alpha)
          #   *       → latest   (clean semver → the stable default tag)
          # This stops a prerelease from ever claiming the default `latest` tag
          # through this workflow, and keeps rc separate from preview.
          case "$VERSION" in
            *-rc.*) DIST_TAG=next ;;
            *-*)    DIST_TAG=preview ;;
            *)      DIST_TAG=latest ;;
          esac
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Idempotency guard: npm registry versions are immutable, so a second
          # publish of an already-present version hard-fails. If this exact
          # version is already on the registry (e.g. re-publishing a Release for
          # a version published before this workflow existed), skip the publish
          # step instead of red-lining the run.
          if npm view "calllint@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "calllint@$VERSION is already on npm; the publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $VERSION to dist-tag '$DIST_TAG'."
          fi

      - name: Publish calllint to npm (trusted publishing + provenance)
        if: steps.meta.outputs.already_published != 'true'
        working-directory: apps/cli
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"

      - name: Derive calllint-mcp dist-tag and idempotency
        id: mcpmeta
        working-directory: packages/calllint-mcp
        run: |
          # calllint-mcp carries its OWN independent version (not the Release
          # tag). The Release tag pins apps/cli; calllint-mcp is published at
          # whatever version is committed here. Its dist-tag is derived the same
          # way, and the same immutability guard skips an already-present version
          # so a Release that only bumps calllint can re-run without red-lining.
          VERSION="$(node -p "require('./package.json').version")"
          case "$VERSION" in
            *-rc.*) DIST_TAG=next ;;
            *-*)    DIST_TAG=preview ;;
            *)      DIST_TAG=latest ;;
          esac
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "calllint-mcp@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "calllint-mcp@$VERSION is already on npm; the publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Publishing calllint-mcp@$VERSION to dist-tag '$DIST_TAG'."
          fi

      - name: Publish calllint-mcp to npm (trusted publishing + provenance)
        if: steps.mcpmeta.outputs.already_published != 'true'
        working-directory: packages/calllint-mcp
        run: npm publish --access public --provenance --tag "${{ steps.mcpmeta.outputs.dist_tag }}"
