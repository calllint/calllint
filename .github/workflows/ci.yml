# Main CI for CallLint. Runs the full quality gate on every push and PR:
# typecheck, tests, build, and both smoke layers (built-artifact + real npm
# pack/install). This workflow NEVER publishes to npm and NEVER executes a
# scanned MCP server — CallLint only ever inspects configs statically.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  build-and-test:
    # Cross-OS matrix (ADR 0037 §6): the real-filesystem apply E2E — the single
    # audited config writer, exercised through the production node fs port — must
    # pass on Windows, macOS, and Linux for a host to be Tier A. Running the whole
    # suite on all three also catches path/line-ending assumptions early.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Windows runners default to PowerShell; our run: steps are POSIX sh.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Evidence audit
        run: pnpm audit:evidence

      # Public-copy + version-consistency guard. Static, no build needed:
      # asserts website/README/agent docs and the internal status docs
      # (ROADMAP/PROJECT_STATUS/PROJECT_HEALTH) stay in sync with
      # project-facts.json and never overclaim. Catches copy/version
      # drift on every PR — not just in the local ci:local script.
      - name: Public-copy + version guard
        run: pnpm check:public-copy

      - name: Build the CLI bundle
        run: pnpm build

      # Corpus release gate: scans the BUILT CLI against pinned verdict contracts.
      # Fully offline and never executes a scanned server. Seed cases are
      # deterministic; remove this step only if corpus calibration is in flux.
      - name: Corpus calibration gate
        run: pnpm corpus:test

      # Agent-trust-bench: proves SkillSpector (content) and CallLint (authority)
      # are complementary. Drives the BUILT CLI with `scan --evidence` over
      # committed fixtures; fully offline, never runs SkillSpector or the server.
      - name: Agent-trust-bench complementarity gate
        run: pnpm bench:test

      - name: Package smoke (shipped artifact)
        run: pnpm smoke

      - name: Pack + isolated install smoke
        run: pnpm pack:smoke

      - name: Pack + stdio smoke (calllint-mcp)
        run: pnpm pack:smoke:mcp
