# ONE-TIME bootstrap: first publish of `calllint-mcp` to npm.
#
# WHY THIS EXISTS (and why it is temporary):
#   npm Trusted Publishing (OIDC) requires the package to already exist before a
#   trusted publisher can be configured for it. `calllint-mcp` is a brand-new
#   name, so its very first publish cannot use OIDC (chicken-and-egg). This
#   workflow performs that one first publish using a short-lived NPM_TOKEN stored
#   as a repo secret, then is DELETED. All subsequent calllint-mcp releases go
#   through release.yml via OIDC + provenance, with NO stored token.
#
# TRADE-OFFS (intentional, documented):
#   - This publish is token-based, so it does NOT carry SLSA provenance. Only the
#     first 0.1.0 lacks it; every later version (via release.yml) will have it.
#   - A token briefly lives in GitHub encrypted secrets. Revoke NPM_TOKEN and
#     delete this workflow immediately after a successful publish.
#
# This workflow NEVER executes a scanned MCP server; it only builds and publishes.
name: bootstrap-mcp-publish

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node >= 22.14 ships npm >= 11.5.1 (matches release.yml). Pin 24.x LTS.
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (typecheck, test, build, corpus, smokes)
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm corpus:test
          pnpm pack:smoke
          pnpm pack:smoke:mcp

      - name: Derive dist-tag and idempotency guard
        id: meta
        working-directory: packages/calllint-mcp
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Clean semver -> latest; any prerelease -> preview (rc -> next).
          case "$VERSION" in
            *-rc.*) DIST_TAG=next ;;
            *-*)    DIST_TAG=preview ;;
            *)      DIST_TAG=latest ;;
          esac
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # npm versions are immutable: skip if this exact version already exists.
          if npm view "calllint-mcp@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "calllint-mcp@$VERSION already on npm; publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Publishing calllint-mcp@$VERSION to dist-tag '$DIST_TAG'."
          fi

      - name: Publish calllint-mcp to npm (token bootstrap, no provenance)
        if: steps.meta.outputs.already_published != 'true'
        working-directory: packages/calllint-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}"
